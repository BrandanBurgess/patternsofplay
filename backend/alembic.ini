[alembic]
# Both paths are resolved relative to the process's working directory
# (Alembic does not resolve them relative to this ini file), so alembic
# is always invoked from the repo root, matching how uvicorn resolves
# DATABASE_URL (see scripts/dev.sh). Do not "fix" this by cd-ing into
# backend/ for alembic commands: that would make alembic and the app
# resolve a relative sqlite:/// path to two different files.
script_location = backend/migrations
prepend_sys_path = backend
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
